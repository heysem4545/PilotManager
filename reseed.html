function log(msg,type='info'){
  const el=document.getElementById('log');
  el.style.display='block';
  const d=document.createElement('div');
  d.className='log-line '+type;
  d.textContent=msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

async function signIn(){
  try{
    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    log('✓ Signed in! Now click Start Seeding.','ok');
  }catch(e){log('Sign in failed: '+e.message,'err');}
}

async function startSeed(){
  const user=auth.currentUser;
  if(!user){log('⚠️ Sign in first!','err');return;}
  const btn=document.querySelectorAll('button')[1];
  btn.textContent='Seeding...';btn.style.opacity='0.6';btn.onclick=null;
  document.getElementById('prog').style.display='block';
  let ok=0,mo=0,err=0;
  for(let i=0;i<PROPERTIES.length;i++){
    const p=PROPERTIES[i];
    try{
      const ref=await db.collection('properties').add({
        addr:p.addr,tenant:p.tenant,rent:p.rent,
        cmha:p.cmha,tenantPortion:p.tenantPortion,
        deposit:p.deposit,status:p.status,
        rowIndex:p.rowIndex,purchaseDate:p.purchaseDate,
        createdAt:new Date()
      });
      ok++;
      for(const[mk,md] of Object.entries(p.months)){
        if(!md.status&&!md.cmhaPaid&&!md.tenantPaid)continue;
        await db.collection('monthlyData').add({
          propertyId:ref.id,monthKey:mk,
          status:md.status,cmhaPaid:md.cmhaPaid,
          tenantPaid:md.tenantPaid,cmha:md.cmha,
          tenantPortion:md.tenantPortion,updatedAt:new Date()
        });
        mo++;
      }
      log('✓ '+p.rowIndex+'. '+p.addr,'ok');
    }catch(e){err++;log('✗ '+p.addr+': '+e.message,'err');}
    document.getElementById('fill').style.width=Math.round((i+1)/PROPERTIES.length*100)+'%';
    btn.textContent='Seeding... '+(i+1)+' / '+PROPERTIES.length;
  }
  log('✅ Done! '+ok+' properties, '+mo+' monthly records, '+err+' errors.','ok');
  btn.textContent='✓ Complete!';
}
