function log(msg, type='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function startImport() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'Importing...';
  document.getElementById('progressBar').style.display = 'block';

  // Check existing properties
  const existing = await db.collection('properties').get();
  if (!existing.empty) {
    log(`⚠️ Found ${existing.size} existing properties - skipping duplicates`, 'info');
  }

  let success = 0;
  let errors = 0;

  for (let i = 0; i < PROPERTIES.length; i++) {
    const p = PROPERTIES[i];
    try {
      await db.collection('properties').add({ ...p, createdAt: new Date() });
      success++;
      log(`✓ ${p.addr}`, 'ok');
    } catch(e) {
      errors++;
      log(`✗ ${p.addr}: ${e.message}`, 'err');
    }
    // Update progress
    const pct = Math.round((i+1) / PROPERTIES.length * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    btn.textContent = `Importing... ${i+1} / ${PROPERTIES.length}`;
  }

  log(`\n✅ Done! ${success} imported, ${errors} errors.`, 'ok');
  btn.textContent = '✓ Import complete!';
  document.getElementById('doneMsg').style.display = 'block';
}
