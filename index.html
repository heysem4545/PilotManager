<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cleanup</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:sans-serif;background:#0d0d10;color:#ededf0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#141418;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;width:500px;max-width:94vw}
h1{font-size:20px;font-weight:600;margin-bottom:6px}
h1 em{font-style:normal;color:#c9f563}
p{font-size:13px;color:#78787f;margin-bottom:20px}
button{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-bottom:10px}
.danger{background:#f5706a;color:#fff}
.log{margin-top:20px;background:#1b1b20;border-radius:10px;padding:16px;font-size:12px;font-family:monospace;max-height:300px;overflow-y:auto;display:none}
.ok{color:#c9f563}.warn{color:#f5c96a}.err{color:#f5706a}
</style>
</head>
<body>
<div class="card">
  <h1>Pilot<em>Manager</em> — Cleanup</h1>
  <p>This will delete ALL monthly data (payments, statuses) while keeping your 129 property addresses intact.</p>
  <button class="danger" onclick="cleanup()">🗑 Delete All Monthly Data</button>
  <div class="log" id="log"></div>
</div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCmv4HclcfpagNPnrHqLErOPccu4SQPLDA",
  authDomain:"pilotmanager-b61e9.firebaseapp.com",
  projectId:"pilotmanager-b61e9",
  storageBucket:"pilotmanager-b61e9.firebasestorage.app",
  messagingSenderId:"70053375652",
  appId:"1:70053375652:web:28524d7c4940e562adc031"
});
const db=firebase.firestore();

function log(msg,type='ok'){
  const el=document.getElementById('log');
  el.style.display='block';
  const d=document.createElement('div');
  d.className=type;d.textContent=msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

async function cleanup(){
  if(!confirm('Delete ALL monthly data? Property addresses will be kept.'))return;
  const btn=document.querySelector('button');
  btn.disabled=true;btn.textContent='Deleting...';
  
  // Delete monthlyData
  let deleted=0;
  while(true){
    const snap=await db.collection('monthlyData').limit(400).get();
    if(snap.empty)break;
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    deleted+=snap.size;
    log(`Deleted ${deleted} monthly records...`,'warn');
  }
  
  // Reset cmhaPaid, tenantPaid on properties to 0
  const props=await db.collection('properties').get();
  const batch=db.batch();
  props.docs.forEach(d=>batch.update(d.ref,{
    cmhaPaid:0,tenantPaid:0,collected:0,
    balance:d.data().rent||0,status:'',
    updatedAt:new Date()
  }));
  await batch.commit();
  log(`Reset ${props.size} properties`,'ok');
  log('✅ Done! Go refresh PilotManager.','ok');
  btn.textContent='✓ Complete';
}
</script>
</body>
</html>
